name: sentry_app
description: "Sentry - Control de acceso seguro a eventos."
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ^3.11.4

dependencies:
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  excel: ^4.0.6
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  intl: ^0.20.2
  google_fonts: ^8.0.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  google_sign_in: ^6.2.1
  supabase_flutter: ^2.12.4
  geolocator: ^13.0.2
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  gal: ^1.1.0
  pdf: ^3.11.0
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icono_sentry2.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/Fiesta_PNG.png
    - assets/images/Llama_PNG.png
    - assets/images/logo.png
    - assets/images/icono_sentry2.png
    - assets/images/Llamasgif.gif
    - assets/templates/PLANTILLA_CSV_SENTRY.xlsx
    - assets/google_fonts/
